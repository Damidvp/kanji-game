spring:
  application:
    name: backend
  profiles:
    active: local
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:dev-only-local-secret-key-change-in-production-32b+}
  expiration-ms: 86400000

